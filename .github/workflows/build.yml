
# 小米15 Ultra HyperOS 3.0.8 安卓16 专用SUSFS内核编译配置（零报错版）
name: Build Kernel
on:
  push:
  workflow_dispatch:
jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # 第一步：拉取内核源码
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: MiCode/Xiaomi_Kernel_OpenSource
          ref: ishtar-6.6-android15
          path: kernel

      # 第二步：注入SUSFS补丁（解决之前extra-cmd无效的问题）
      - name: Apply SUSFS patch
        working-directory: ./kernel
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-dev

      # 第三步：编译内核（修正了编译器依赖问题）
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-dir: ./kernel
          config: ishtar_user_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: true
          ksu-version: main
          android-version: 16
          anykernel3: true

