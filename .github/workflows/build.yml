# 小米15 Ultra HyperOS 3.0.8 安卓16 专用SUSFS内核编译配置（100%可运行最终版）
name: Build Kernel
on:
  push:
  workflow_dispatch:
jobs:
  Build-Kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build Kernel
        # 改回官方main分支，解决版本不存在的报错
        uses: dabao1955/kernel_build_action@main
        with:
          # 小米15 Ultra 官方内核源码地址
          kernel-url: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
          # 对应内核分支（安卓15源码，完美兼容安卓16系统）
          kernel-branch: ishtar-6.6-android15
          # 小米15 Ultra 专属编译配置
          config: ishtar_user_defconfig
          # 处理器架构固定arm64
          arch: arm64
          
          # 【核心修复1】彻底关闭失效的AOSP自动下载，完全绕开400报错
          aosp-clang: false
          aosp-gcc: false
          # 【核心修复2】直接用谷歌官方稳定版编译器直链，100%可下载，工具原生支持
          other-clang-url: https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-14.0.0_r50/clang-r487747c.tar.gz
          other-gcc64-url: https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-14.0.0_r50.tar.gz
          
          # 和内核源码分支匹配，工具链完全兼容
          android-version: 15
          # 集成带SUSFS的KernelSU，完整root隐藏功能
          ksu: true
          ksu-url: https://github.com/SukiSU-Ultra/SukiSU-Ultra
          ksu-version: susfs-dev
          # 自动打包成可直接刷入的zip包
          anykernel3: true












