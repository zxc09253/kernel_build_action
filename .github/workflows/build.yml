# 小米15 Ultra HyperOS 3.0.8 安卓16 专用SUSFS内核编译配置
name: Build Kernel
on:
  push:
  workflow_dispatch:
jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
          kernel-branch: ishtar-6.6-android15
          config: ishtar_user_defconfig
          arch: arm64
          aosp-clang: true
          ksu: true
          ksu-version: susfs-dev
          android-version: 16
          anykernel3: true
          extra-cmd: |
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-dev

