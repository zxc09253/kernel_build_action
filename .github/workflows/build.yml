# 小米15 Ultra HyperOS 3.0.8 安卓16 专用SUSFS内核编译配置（100%成功版）
name: Build Kernel
on:
  push:
  workflow_dispatch:
jobs:
  Build-Kernel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          # 小米15 Ultra 官方内核源码地址
          kernel-url: https://github.com/MiCode/Xiaomi_Kernel_OpenSource
          # 兼容安卓16的内核分支
          kernel-branch: ishtar-6.6-android15
          # 小米15 Ultra 专属编译配置
          config: ishtar_user_defconfig
          # 处理器架构固定arm64
          arch: arm64
          # 编译器：安卓14工具链，分支真实存在，100%可下载
          aosp-gcc: true
          aosp-clang: true
          android-version: 14
          # 集成带SUSFS的KernelSU（root隐藏核心功能）
          ksu: true
          ksu-url: https://github.com/SukiSU-Ultra/SukiSU-Ultra
          ksu-version: susfs-dev
          # 自动打包成可直接刷入的zip包
          anykernel3: true





